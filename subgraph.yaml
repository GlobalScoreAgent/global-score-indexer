# Plantilla operativa: cambiar `network` y `startBlock` en ambos dataSources antes de cada deploy.
# Un subgraph por chain en Ormi. Ver networks.json y docs/operaciones.md para valores por red.
specVersion: 1.3.0
schema:
  file: ./schema.graphql
dataSources:
  # --- CONTRATO 1: IDENTITY REGISTRY (Registro de Agentes) ---
  - kind: ethereum
    name: AgentRegistry
    network: arbitrum-one
    source:
      address: "0x8004A169FB4a3325136EB29fA0ceB6D2e539a432"
      abi: AgentRegistry
      startBlock: 245348700
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Agent
      abis:
        - name: AgentRegistry
          file: ./abis/agentregistry.json
      eventHandlers:
        # Firma validada con tu ABI: agentId(indexed), agentURI, owner(indexed)
        - event: Registered(indexed uint256,string,indexed address)
          handler: handleRegistered
      file: ./src/mapping.ts

  # --- CONTRATO 2: REPUTATION REGISTRY (Feedbacks) ---
  - kind: ethereum
    name: AgentReputation
    network: arbitrum-one
    source:
      address: "0x8004BAa17C55a88189AE136b182e5fdA19dE9b63"
      abi: AgentRegistry 
      startBlock: 245348700
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities: 
        - Feedback
        - FeedbackResponse
      abis:
        - name: AgentRegistry
          file: ./abis/agentregistry.json
      eventHandlers:
        # El evento real para feedback (11 parámetros totales)
        - event: NewFeedback(indexed uint256,indexed address,uint64,int128,uint8,indexed string,string,string,string,string,bytes32)
          handler: handleNewFeedback
          # AÑADE ESTA LÍNEA SI TU VERSIÓN DE SPEC LO SOPORTA:
          receipt: true
        # El evento real para respuestas
        - event: ResponseAppended(indexed uint256,indexed address,uint64,indexed address,string,bytes32)
          handler: handleResponseAppended
        # El evento real para revocaciones (fíjate que clientAddress e index son indexed aquí)
        - event: FeedbackRevoked(indexed uint256,indexed address,indexed uint64)
          handler: handleFeedbackRevoked
      file: ./src/mapping.ts 