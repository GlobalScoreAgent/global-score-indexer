type Erc8183Job @entity(immutable: true) {
  id: ID!
  jobId: BigInt!
  contractAddress: Bytes!
  implementation: String!
  client: Bytes!
  provider: Bytes!
  evaluator: Bytes
  expiredAt: BigInt!
  hook: Bytes
  chainId: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  txHash: Bytes!
  logIndex: BigInt!
}

