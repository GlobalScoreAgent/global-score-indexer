# Olas Mech Marketplace — Base
# Deploy Ormi: olas-mech-base (separado de erc-8004-agent-base)
# Valores en networks-olas.json
specVersion: 1.3.0
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: MechMarketplace
    network: base
    source:
      address: "0xf24eE42edA0fc9b33B7D41B06Ee8ccD2Ef7C5020"
      abi: MechMarketplace
      startBlock: 26642705
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OlasMech
        - OlasMarketplaceRequest
        - OlasMarketplaceDelivery
        - OlasDeliver
      abis:
        - name: MechMarketplace
          file: ../../abis/olas/MechMarketplace.abi.json
      eventHandlers:
        - event: CreateMech(indexed address,indexed uint256,indexed address)
          handler: handleCreateMech
        - event: MarketplaceRequest(indexed address,indexed address,uint256,bytes32[],bytes[])
          handler: handleMarketplaceRequest
        - event: MarketplaceDelivery(indexed address,address[],uint256,bytes32[],bool[])
          handler: handleMarketplaceDelivery
        - event: MarketplaceDeliveryWithSignatures(indexed address,indexed address,uint256,bytes32[])
          handler: handleMarketplaceDeliveryWithSignatures
        - event: Deliver(indexed address,indexed address,bytes32,uint256,bytes)
          handler: handleDeliver
      file: ./src/mapping.ts

  - kind: ethereum
    name: Karma
    network: base
    source:
      address: "0x7F69B6783855772d10A4bc2AFAaE650599F040DB"
      abi: Karma
      startBlock: 26642705
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OlasKarmaChange
      abis:
        - name: Karma
          file: ../../abis/olas/Karma.abi.json
      eventHandlers:
        - event: MechKarmaChanged(indexed address,int256)
          handler: handleMechKarmaChanged
        - event: RequesterMechKarmaChanged(indexed address,indexed address,int256)
          handler: handleRequesterMechKarmaChanged
      file: ./src/mapping.ts

  - kind: ethereum
    name: BalanceTrackerNative
    network: base
    source:
      address: "0xB3921F8D8215603f0Bd521341Ac45eA8f2d274c1"
      abi: BalanceTracker
      startBlock: 26642705
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OlasBalanceEvent
      abis:
        - name: BalanceTracker
          file: ../../abis/olas/BalanceTrackerFixedPriceNative.abi.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256)
          handler: handleDeposit
        - event: RequesterBalanceAdjusted(indexed address,uint256,uint256)
          handler: handleRequesterBalanceAdjusted
        - event: MechBalanceAdjusted(indexed address,uint256,uint256,uint256)
          handler: handleMechBalanceAdjusted
        - event: Withdraw(indexed address,indexed address,uint256)
          handler: handleWithdraw
        - event: Drained(indexed address,uint256)
          handler: handleDrained
      file: ./src/mapping.ts

  - kind: ethereum
    name: BalanceTrackerOlas
    network: base
    source:
      address: "0x43fB32f25dce34EB76c78C7A42C8F40F84BCD237"
      abi: BalanceTracker
      startBlock: 26642705
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OlasBalanceEvent
      abis:
        - name: BalanceTracker
          file: ../../abis/olas/BalanceTrackerFixedPriceToken.abi.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256)
          handler: handleDepositOlas
        - event: RequesterBalanceAdjusted(indexed address,uint256,uint256)
          handler: handleRequesterBalanceAdjustedOlas
        - event: MechBalanceAdjusted(indexed address,uint256,uint256,uint256)
          handler: handleMechBalanceAdjustedOlas
        - event: Withdraw(indexed address,indexed address,uint256)
          handler: handleWithdrawOlas
        - event: Drained(indexed address,uint256)
          handler: handleDrainedOlas
      file: ./src/mapping.ts

  - kind: ethereum
    name: BalanceTrackerUsdc
    network: base
    source:
      address: "0x0443C55e151dBA13fae079518F9dd01ff9c21CB2"
      abi: BalanceTracker
      startBlock: 26642705
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OlasBalanceEvent
      abis:
        - name: BalanceTracker
          file: ../../abis/olas/BalanceTrackerFixedPriceToken.abi.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256)
          handler: handleDepositUsdc
        - event: RequesterBalanceAdjusted(indexed address,uint256,uint256)
          handler: handleRequesterBalanceAdjustedUsdc
        - event: MechBalanceAdjusted(indexed address,uint256,uint256,uint256)
          handler: handleMechBalanceAdjustedUsdc
        - event: Withdraw(indexed address,indexed address,uint256)
          handler: handleWithdrawUsdc
        - event: Drained(indexed address,uint256)
          handler: handleDrainedUsdc
      file: ./src/mapping.ts

  - kind: ethereum
    name: BalanceTrackerNvm
    network: base
    source:
      address: "0x3d79737f05966c5925a04d1b04110006F5a072bE"
      abi: BalanceTrackerNvm
      startBlock: 26642705
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OlasBalanceEvent
      abis:
        - name: BalanceTrackerNvm
          file: ../../abis/olas/BalanceTrackerNvmSubscriptionNative.abi.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256)
          handler: handleDepositNvm
        - event: RequesterBalanceAdjusted(indexed address,uint256,uint256)
          handler: handleRequesterBalanceAdjustedNvm
        - event: MechBalanceAdjusted(indexed address,uint256,uint256,uint256)
          handler: handleMechBalanceAdjustedNvm
        - event: Withdraw(indexed address,indexed address,uint256)
          handler: handleWithdrawNvm
        - event: Drained(indexed address,uint256)
          handler: handleDrainedNvm
        - event: RequesterCreditsRedeemed(indexed address,uint256)
          handler: handleRequesterCreditsRedeemedNvm
      file: ./src/mapping.ts

  - kind: ethereum
    name: BalanceTrackerNvmUsdc
    network: base
    source:
      address: "0xaaFBeef195BDAb1Bb6f3Dc9cEbA875Cd72499230"
      abi: BalanceTrackerNvm
      startBlock: 26642705
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OlasBalanceEvent
      abis:
        - name: BalanceTrackerNvm
          file: ../../abis/olas/BalanceTrackerFixedPriceToken.abi.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256)
          handler: handleDepositNvmUsdc
        - event: RequesterBalanceAdjusted(indexed address,uint256,uint256)
          handler: handleRequesterBalanceAdjustedNvmUsdc
        - event: MechBalanceAdjusted(indexed address,uint256,uint256,uint256)
          handler: handleMechBalanceAdjustedNvmUsdc
        - event: Withdraw(indexed address,indexed address,uint256)
          handler: handleWithdrawNvmUsdc
        - event: Drained(indexed address,uint256)
          handler: handleDrainedNvmUsdc
      file: ./src/mapping.ts
