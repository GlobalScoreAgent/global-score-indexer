# Virtual Marketplace — Base
# Deploy Ormi: virtual-acp-base (separado de erc-8004-agent-base y olas-mech-base)
# Valores en networks-virtual.json
specVersion: 1.3.0
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: ACPCore
    network: base
    source:
      address: "0x238E541BfefD82238730D00a2208E5497F1832E0"
      abi: AgenticCommerceV3
      startBlock: 44427015
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - VirtualAcpJob
        - VirtualAcpJobStatus
        - VirtualAcpDelivery
        - VirtualAcpPayment
        - VirtualAcpBudget
      abis:
        - name: AgenticCommerceV3
          file: ../../abis/virtual/AgenticCommerceV3.abi.json
      eventHandlers:
        - event: JobCreated(indexed uint256,indexed address,indexed address,address,uint256,address)
          handler: handleJobCreated
        - event: JobFunded(indexed uint256,indexed address,uint256)
          handler: handleJobFunded
        - event: BudgetSet(indexed uint256,uint256)
          handler: handleBudgetSet
        - event: JobSubmitted(indexed uint256,indexed address,bytes32)
          handler: handleJobSubmitted
        - event: JobCompleted(indexed uint256,indexed address,bytes32)
          handler: handleJobCompleted
        - event: JobRejected(indexed uint256,indexed address,bytes32)
          handler: handleJobRejected
        - event: JobExpired(indexed uint256)
          handler: handleJobExpired
        - event: PaymentReleased(indexed uint256,indexed address,uint256)
          handler: handlePaymentReleased
        - event: Refunded(indexed uint256,indexed address,uint256)
          handler: handleRefunded
      file: ./src/mapping.ts

  - kind: ethereum
    name: Bonding
    network: base
    source:
      address: "0xF66DeA7b3e897cD44A5a231c61B6B4423d613259"
      abi: Bonding
      startBlock: 44427015
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - VirtualBondLaunch
        - VirtualAgentGraduation
      abis:
        - name: Bonding
          file: ../../abis/virtual/Bonding.abi.json
      eventHandlers:
        - event: Launched(indexed address,indexed address,uint256)
          handler: handleLaunched
        - event: Graduated(indexed address,address)
          handler: handleGraduated
      file: ./src/mapping.ts

  - kind: ethereum
    name: AgentFactory
    network: base
    source:
      address: "0x71B8EFC8BCaD65a5D9386D07f2Dff57ab4EAf533"
      abi: AgentFactoryV3
      startBlock: 44427015
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - VirtualAgentPersona
        - VirtualAgentApplication
      abis:
        - name: AgentFactoryV3
          file: ../../abis/virtual/AgentFactoryV3.abi.json
      eventHandlers:
        - event: NewApplication(uint256)
          handler: handleNewApplication
        - event: NewPersona(uint256,address,address,address,address,address)
          handler: handleNewPersona
      file: ./src/mapping.ts
