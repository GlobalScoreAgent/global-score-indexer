          handler: handleReviewCreated
        - event: ReviewEdited(indexed uint256,indexed address,indexed address)
          handler: handleReviewEdited
        - event: ReviewArchived(indexed uint256,indexed address,indexed address)
          handler: handleReviewArchived
        - event: ReviewRestored(indexed uint256,indexed address,indexed address)
          handler: handleReviewRestored
      file: ./src/mapping.ts

  - kind: ethereum
    name: EthosVouch
