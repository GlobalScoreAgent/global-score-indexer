          handler: handleVouched
        - event: VouchIncreased(indexed uint256,indexed uint256,indexed uint256,address,bytes32,uint256,uint256)
          handler: handleVouchIncreased
        - event: Unvouched(indexed uint256,indexed uint256,indexed uint256,uint256)
          handler: handleUnvouched
        - event: MarkedUnhealthy(indexed uint256,indexed uint256,indexed uint256)
          handler: handleMarkedUnhealthy
        - event: Slashed(indexed uint256,uint256,uint256)
          handler: handleVouchSlashed
      file: ./src/mapping.ts

  - kind: ethereum
