# Ethos Network — Base Mainnet
# Deploy Goldsky: ethos-network-base/1.0.0 → tag prod
# Valores en networks-ethos.json
specVersion: 1.3.0
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: EthosProfile
    network: base
    source:
      address: "0x209820B843900Ef77BD639455cDE15F38A252a36"
      abi: EthosProfile
      startBlock: 26984375
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - EthosProfile
        - EthosProfileAddress
      abis:
        - name: EthosProfile
          file: ../../abis/ethos/EthosProfile.abi.json
      eventHandlers:
        - event: ProfileCreated(indexed uint256,indexed address)
          handler: handleProfileCreated
        - event: MockProfileCreated(indexed uint256)
          handler: handleMockProfileCreated
        - event: ProfileArchived(indexed uint256)
          handler: handleProfileArchived
        - event: ProfileRestored(indexed uint256)
          handler: handleProfileRestored
        - event: AddressClaim(indexed uint256,indexed address,indexed uint8)
          handler: handleAddressClaim
        - event: UserInvited(uint256,address)
          handler: handleUserInvited
        - event: InvitesAdded(uint256,uint256)
          handler: handleInvitesAdded
      file: ./src/mapping.ts

  - kind: ethereum
