type Agent {
  id: ID!
  agentId: BigInt!
  owner: String!
  agentURIRaw: String!
  agentURIJson: String!
  registration: Registration! @hasOne(field: "id")
  name: String
  description: String
  imageUrl: String
  web: String
  email: String
}

type Registration {
  id: ID!
  chainId: String!
  active: Boolean!
  createdAt: BigInt!
  updatedAt: BigInt!
  lastActivityAt: BigInt!
  agentWallet: String!
  x402Support: Boolean!
  supportedTrust: [String!]!
  tags: [String!]!
  oasf_skills: [String!]!
  oasf_domains: [String!]!
  hasMCPServices: Boolean!
  hasOASFServices: Boolean!
  hasA2AServices: Boolean!
  hasX402ComputeServices: Boolean!
  hasWalletEndpoint: Boolean!
  hasExtraServices: Boolean!
  hasServiceIndexingError: Boolean!
  registrationJsonRaw: String!
  mcp: String
  oasf: String
  a2a: String
  x402Compute: String
  walletEndpoint: String
  rawServicesJson: String
}
