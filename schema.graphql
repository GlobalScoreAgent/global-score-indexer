type Agent @entity {
  id: ID!
  agentId: BigInt!
  owner: String!
  name: String
  description: String
  email: String
  web: String
  imageUrl: String
  agentURIRaw: String
  agentURIJson: String
  registration: Registration!
}

type Registration @entity {
  id: ID!
  chainId: String!
  active: Boolean!
  createdAt: BigInt!
  updatedAt: BigInt!
  lastActivityAt: BigInt!
  agentWallet: String!
  x402Support: Boolean
  supportedTrust: [String!]
  tags: [String!]
  oasf_skills: [String!]
  oasf_domains: [String!]
  hasMCPServices: Boolean!
  mcp: String
  hasOASFServices: Boolean!
  oasf: String
  hasA2AServices: Boolean!
  a2a: String
  hasX402ComputeServices: Boolean!
  x402Compute: String
  hasWalletEndpoint: Boolean!
  walletEndpoint: String
  hasExtraServices: Boolean!
  rawServicesJson: String
  hasServiceIndexingError: Boolean!
  registrationJsonRaw: String
}